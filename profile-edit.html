    <div class="contents-container">
        <section class="account-container">
            <div class="form-container">
                <div class="form-title">
                    <h1>アカウント</h1>
                </div>
                <div class="green-bar"></div>
        
                <div class="account">
                    <ul>
                        <li>
                            <div>
                                <i class="bi bi-person-circle"></i>
                                <h2>ユーザーID</h2>
                            </div>
                            <div>
                                <p>Ibaraki2022</p>
                            </div>
                        </li>
                        <li>
                            <div>
                                <i class="bi bi-lock"></i>
                                <h2>パスワード</h2>
                            </div>
                            <div>
                                <p>************</p>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
            <div  class="form-container logout">
                <div>
                    <a href="index.html">
                        <div>
                            <i class="bi bi-box-arrow-in-left"></i>
                        </div>
                        <p>ログアウト</p>
                    </a>
                </div>
            </div>
        </section>
    
        <section class="user-info">
            <div class="form-container">
                <div class="form-title">
                    <h1>基本情報</h1>
                    <button onclick="location.href='profile.html'">編集を完了する</button>
                </div>
                <div class="green-bar"></div>
        
                <div class="basic-info">

                    <form action="" method="post">

                        <div class="birthday_container">
                            <h2>生年月日</h2>
                            <div class="birthday">
                                <input type="text" id="birth_year" name="birth_year" value="2001">
                                <span>年</span>
                                <input type="text" id="birth_month" name="birth_month" value="11">
                                <span>月</span>
                                <input type="text" id="birth_day" name="birth_day" value="30">
                                <span>日</span>
                            </div>
                        </div>
            
                        <div class="sex_container">
                            <h2>性別</h2>
                            <div class="sex-radio">
                            
                                <input type="radio" name="sex" id="sex-male" value="male" checked>
                                <label for="sex-male">男性</label>

                            
                                <input type="radio" name="sex" id="sex-female" value="female">
                                <label for="sex-female">女性</label>

                                <input type="radio" name="sex" id="sex-other" value="other">
                                <label for="sex-other">その他</label>

                       
                                <input type="radio" name="sex" id="sex-unknown" value="unknown">
                                <label for="sex-unknown">回答しない</label>
                            </div>
                        </div>
            
                        <div class="height_container">
                            <h2>身長</h2>
                            <div class="height">
                                <input type="text" name="height" id="height" value="173.5">
                                <span>cm</span>
                            </div>
                        </div>
            
                        <div class="weight_container">
                            <h2>体重</h2>
                            <div class="weight">
                                <input type="text" name="weight" id="weight" value="64.7">
                                <span>kg</span>
                            </div>
                        </div>
            
                        <div class="exercise-intensity_container">
                            <h2>運動強度</h2>
                            <div>                            
                                    <input type="radio" name="exercise-intensity" value="1" id="exercise-intensity-1" checked>
                                    <label for="exercise-intensity-1">1: 毎日座っているような生活</label>
 
                            </div>
                            <div>
                                <label>
                                    <input type="radio" name="exercise-intensity" value="2" id="exercise-intensity-2">
                                    <label for="exercise-intensity-2">2: 階段の上り下りや補講をする生活</label>
                                    
                                </label>
                            </div>
                            <div>
                                <label>
                                    <input type="radio" name="exercise-intensity" value="3" id="exercise-intensity-3">
                                    <label for="exercise-intensity-3">3: スポーツを日々行っている生活</label>
                                </label>
                            </div>
                        </div>
            
                        <div class="purpose-container">
                            <div>
                                <h2>本アプリの利用目的</h2>
                                <span>(あなたの食設計のために行います)</span>
                            </div>
                            <div>
                                <input type="checkbox" name="purpose" value="1" id="purpose-1" checked>    
                                <label for="purpose-1">栄養状態の把握のため</label>
                            </div>
                            <div>
                                <input type="checkbox" name="purpose" value="2" id="purpose-2">
                                <label for="purpose-2">ダイエットのため</label>
                            </div>
                            <div>
                                <input type="checkbox" name="purpose" value="3" id="purpose-3">
                                <label for="purpose-3">筋力トレーニングのため</label>
                                
                            </div>
                        </div>
            
                    </form>
 
                </div>
            </div>
        
            <div class="form-container">
                <div class="form-title">
                    <h1>食に関する情報</h1>
                    <button onclick="location.href='profile.html'">編集を完了する</button>
                </div>
                <div class="green-bar"></div>
        
                <div class="basic-info">

                    <div class="favorite-foods-container">
                        <label for="favorite-foods">
                            <span>好きな食べ物</span>
                        </label>
                        <textarea name="favorite-foods" id="" cols="30" rows="10">たまご&#13;&#10;豆腐&#13;&#10;牛肉</textarea>
                    </div>
            
                    <div class="disliked-foods-container">
                        <label for="disliked-foods">
                            <span>嫌いな食べ物</span>
                        </label>
                        <textarea name="disliked-foods" id="" cols="30" rows="10">貝類&#13;&#10;甲殻類</textarea>
                    </div>
            
                    <div class="allergy-container">
                        <h2>アレルギー</h2>
                        <ul>
                            <li>
                                <select name="allergy1" id="allergy1">
                                    <option value="0">------</option>
                                    <option value="卵">卵</option>
                                    <option value="乳">乳</option>
                                    <option value="小麦">小麦</option>
                                    <option value="えび" selected>えび</option>
                                    <option value="かに">かに</option>
                                    <option value="落花生">落花生</option>
                                    <option value="そば">そば</option>
                                </select>
                            </li>
                            <li>
                                <select name="allergy2" id="allergy2">
                                    <option value="0">------</option>
                                    <option value="卵">卵</option>
                                    <option value="乳">乳</option>
                                    <option value="小麦">小麦</option>
                                    <option value="えび">えび</option>
                                    <option value="かに">かに</option>
                                    <option value="落花生" selected>落花生</option>
                                    <option value="そば">そば</option>
                                </select>
                            </li>
                            <li>
                                <select name="allergy3" id="allergy3">
                                    <option value="0" selected>------</option>
                                    <option value="卵">卵</option>
                                    <option value="乳">乳</option>
                                    <option value="小麦">小麦</option>
                                    <option value="えび">えび</option>
                                    <option value="かに">かに</option>
                                    <option value="落花生">落花生</option>
                                    <option value="そば">そば</option>
                                </select>
                            </li>
                            <li>
                                <select name="allergy4" id="allergy4">
                                    <option value="0" selected>------</option>
                                    <option value="卵">卵</option>
                                    <option value="乳">乳</option>
                                    <option value="小麦">小麦</option>
                                    <option value="えび">えび</option>
                                    <option value="かに">かに</option>
                                    <option value="落花生">落花生</option>
                                    <option value="そば">そば</option>
                                </select>
                            </li>
                            <li>
                                <select name="allergy5" id="allergy5">
                                    <option value="0" selected>------</option>
                                    <option value="卵">卵</option>
                                    <option value="乳">乳</option>
                                    <option value="小麦">小麦</option>
                                    <option value="えび">えび</option>
                                    <option value="かに">かに</option>
                                    <option value="落花生">落花生</option>
                                    <option value="そば">そば</option>
                                </select>
                            </li>
                        </ul>
                    </div>

                </div>
            </div>
        </section>
    </div>
